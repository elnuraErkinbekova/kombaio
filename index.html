<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="index.css" />
		<title>Kombaio</title>
	</head>
	<body>
		<main>
			<div class="container_left">
				<div class="player_opp">
					<img src="./cards/back.svg" alt="" />
					<img src="./cards/back.svg" alt="" />
					<img src="./cards/back.svg" alt="" />
					<img src="./cards/back.svg" alt="" />
				</div>
				<div class="last_c_c">
					<button id="start_btn" onclick="start()">Start</button>
					<button id="stop_btn" style="display: none;" onclick="stop()">Stop</button>
					<div class="last_played_c">
						<div class="last_played_card"></div>
						<p>Last Played Card</p>
					</div>
				</div>
			</div>
			<div class="container_right">
				<div class="deck_c">
					<div class="stack">
						<img src="./cards/back.svg" class="deck_card" />
						<img src="./cards/back.svg" class="deck_card" />
						<img src="./cards/back.svg" class="deck_card" />
						<img src="./cards/back.svg" class="deck_card" />
						<img src="./cards/back.svg" class="deck_card" />
					</div>
					<p>The Deck</p>
				</div>
				<div class="player_me">
					<img src="./cards/back.svg" alt="" />
					<img src="./cards/back.svg" alt="" />
					<img src="./cards/back.svg" alt="" />
					<img src="./cards/back.svg" alt="" />
				</div>
			</div>
		</main>
		<script src="./logic.js"></script>
	</body>
</html>
